<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ryal Star</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #0f172a; color: #e2e8f0; margin: 0; height: 100vh; overflow: hidden; }
        .log-container { scrollbar-width: thin; scrollbar-color: #475569 #1e293b; }
        .log-container::-webkit-scrollbar { width: 8px; }
        .log-container::-webkit-scrollbar-track { background: #1e293b; }
        .log-container::-webkit-scrollbar-thumb { background-color: #475569; border-radius: 4px; }
        
        /* The Ryal Star Visuals */
        .star-container { position: relative; width: 60px; height: 60px; transform: rotate(45deg); margin: 10px auto; }
        .star-piece { position: absolute; width: 28px; height: 28px; background-color: #334155; transition: all 0.5s; border: 1px solid #0f172a; }
        .piece-0 { top: 0; left: 0; clip-path: polygon(100% 0, 100% 100%, 0 100%, 0 50%, 50% 0); }
        .piece-1 { top: 0; right: 0; clip-path: polygon(0 0, 100% 50%, 100% 100%, 0 100%, 50% 0); }
        .piece-2 { bottom: 0; left: 0; clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 100%, 0 50%); }
        .piece-3 { bottom: 0; right: 0; clip-path: polygon(0 0, 100% 0, 50% 100%, 100% 50%, 100% 100%); }
        .collected { background-color: #fbbf24; box-shadow: 0 0 10px #fbbf24; }

        .btn { @apply px-4 py-2 bg-slate-700 hover:bg-slate-600 border border-slate-500 rounded text-sm font-bold uppercase transition-colors disabled:opacity-50 disabled:cursor-not-allowed; }
        .stat-bar-bg { @apply w-full bg-slate-800 rounded h-3 mt-1 overflow-hidden; }
        .hp-bar { @apply h-full bg-red-500 transition-all duration-300; }
        .sp-bar { @apply h-full bg-blue-500 transition-all duration-300; }
        .xp-bar { @apply h-full bg-green-500 transition-all duration-300; }

        /* Portrait & Map Rendering */
        #portrait-canvas { image-rendering: pixelated; width: 96px; height: 96px; background: #1e293b; border: 2px solid #475569; border-radius: 8px; }
        #map-canvas { image-rendering: pixelated; }
        
        .lore-text { color: #cbd5e1; line-height: 1.6; }
        .dialogue { color: #93c5fd; font-style: italic; }
    </style>
</head>
<body class="flex flex-col h-screen">

                <div id="relic-3" class="star-piece piece-3"></div>

            </div>
        </div>

                    </div>

<script>
    /* ================= AUDIO ENGINE ================= */
    const AudioEngine = {
        ctx: null, isPlaying: false, step: 0, nextNoteTime: 0,
        currentTrack: 'somber', area: 0, bpm: 100, timerID: null,

        init: function() {
            if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            if(this.ctx.state === 'suspended') this.ctx.resume();
            this.isPlaying = !this.isPlaying;
            if(this.isPlaying) {
                this.nextNoteTime = this.ctx.currentTime + 0.05;
                this.scheduler();
            }
            return this.isPlaying;
        },

        setTrack: function(track, area) {
            this.currentTrack = track; this.area = area; this.step = 0;
            if(track === 'somber') this.bpm = 85;
            if(track === 'upbeat') this.bpm = 130;
            if(track === 'maze') this.bpm = 110;
            if(track === 'boss') this.bpm = 140;
            if(track === 'final_boss') this.bpm = 165;
        },

        playTone: function(freq, type, time, dur, vol) {
            if(!this.ctx) return;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type; osc.frequency.value = freq;
            osc.connect(gain); gain.connect(this.ctx.destination);
            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(vol, time + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, time + dur);
            osc.start(time); osc.stop(time + dur);
        },

        playNoise: function(time, dur, vol) {
            const bufferSize = this.ctx.sampleRate * dur;
            const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = this.ctx.createBufferSource(); noise.buffer = buffer;
            const filter = this.ctx.createBiquadFilter(); filter.type = 'highpass'; filter.frequency.value = 5000;
            const gain = this.ctx.createGain();
            noise.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination);
            gain.gain.setValueAtTime(vol, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + dur);
            noise.start(time);
        },

        scheduler: function() {
            if(!this.isPlaying) return;
            while (this.nextNoteTime < this.ctx.currentTime + 0.1) {
                this.scheduleNote(this.step, this.nextNoteTime);
                this.nextNote();
            }
            this.timerID = setTimeout(() => this.scheduler(), 25);
        },

        nextNote: function() {
            const secondsPerBeat = 60.0 / this.bpm;
            this.nextNoteTime += 0.25 * secondsPerBeat;
            this.step++;
            if (this.step >= 64) this.step = 0;
        },

        scheduleNote: function(step, time) {
            const bar = Math.floor(step / 16); const beat = Math.floor(step / 4) % 4; const sixteenth = step % 4;
            const areaRoots = [55, 57, 50, 52, 48]; // G, A, D, E, C
            let root = areaRoots[this.area] || 48;
            
            const minor = [0, 2, 3, 5, 7, 8, 10]; const major = [0, 2, 4, 5, 7, 9, 11]; const phrygian = [0, 1, 3, 5, 7, 8, 10];
            let scale = minor; let prog = [0, 0, 5, 4];
            
            if(this.area === 2 && this.currentTrack !== 'upbeat') scale = phrygian;

            if(this.currentTrack === 'upbeat') { scale = major; prog = [0, 4, 3, 4]; }
            else if (this.currentTrack === 'maze') { scale = minor; prog = [0, 0, 3, 4]; }
            else if (this.currentTrack === 'boss') { scale = phrygian; prog = [0, 1, 0, 1]; }
            else if (this.currentTrack === 'final_boss') { scale = minor; prog = [0, 5, 3, 6]; }

            const currentChordRootIndex = prog[bar];
            const chordRootNote = root + scale[currentChordRootIndex % 7] + Math.floor(currentChordRootIndex/7)*12;
            
            const arpOffsets = [0, 2, 4, 2];
            const arpNoteIdx = arpOffsets[step % 4] + currentChordRootIndex;
            const arpNote = root + scale[arpNoteIdx % 7] + Math.floor(arpNoteIdx/7)*12 + 12;
            
            // Bass
            if(sixteenth === 0 || (this.currentTrack === 'maze' && sixteenth === 2)) {
                const bassFreq = 440 * Math.pow(2, (chordRootNote - 24 - 69) / 12);
                let oscType = (this.currentTrack.includes('boss') || this.currentTrack === 'maze') ? 'sawtooth' : 'triangle';
                this.playTone(bassFreq, oscType, time, 0.4, 0.25);
            }
            
            // Arp Synth
            if(this.currentTrack !== 'somber' || sixteenth % 2 === 0) {
                const arpFreq = 440 * Math.pow(2, (arpNote - 69) / 12);
                let arpOsc = this.currentTrack === 'final_boss' ? 'sawtooth' : 'square';
                this.playTone(arpFreq, arpOsc, time, 0.1, 0.05);
            }

            // Epic Orchestral Chords for Final Boss
            if(this.currentTrack === 'final_boss' && sixteenth === 0) {
                [0, 2, 4].forEach(offset => {
                    const cIdx = currentChordRootIndex + offset;
                    const cNote = root + scale[cIdx % 7] + Math.floor(cIdx/7)*12 + 12;
                    this.playTone(440 * Math.pow(2, (cNote - 69) / 12), 'sawtooth', time, 0.3, 0.08);
                });
            }

            // Lead Melody
            if(step % 8 === 0 || step % 8 === 3) {
                const leadNote = arpNote + 12 + scale[step % 7];
                this.playTone(440 * Math.pow(2, (leadNote - 69) / 12), 'square', time, 0.3, 0.06);
            }
            
            // Drums
            if(this.currentTrack !== 'somber') {
                if(sixteenth === 2) this.playNoise(time, 0.05, 0.1); 
                if(beat % 2 === 1 && sixteenth === 0) this.playNoise(time, 0.2, 0.2); 
            } else if(this.area === 3 && step % 16 === 0) {
                this.playNoise(time, 1.0, 0.05); // Winter wind
            }
        }
    };

        const btn = document.getElementById('music-toggle');
        if(AudioEngine.init()) {

            btn.classList.remove('text-slate-400');

            happy:   ["00001111110000","0001hhhhhh1000","001hhsssshh100","01hssssssssh10","01ssssssssss10","1ssssssssssss1","1ss111ss111ss1","1ssssssssssss1","1xxxx1ss1xxxx1","1xxxx1111xxxx1","01xxxxxxxxx10","001xxxxxxx100","00011111110000","00000000000000"],

            happy:   ["00001111110000","0001hhhhhh1000","001hhsssshh100","01ssssssssss10","1ssssssssssss1","1ss111ss111ss1","1ssssssssssss1","1ssss1ss1ssss1","1hsss1111sssh1","01hssssssss10","001hhsssshh100","00011hhhh1000","00001111110000","00000000000000"],
            angry:   ["00001111110000","0001hhhhhh1000","001hhsssshh100","01ss11ss11ss10","1ss1e1ss1e1ss1","1ssssssssssss1","1ssssssssssss1","1hssss11ssssh1","1hsss1xx1sssh1","01hssssssss10","001hhsssshh100","00011hhhh1000","00001111110000","00000000000000"]
        },
        cleric: {
            neutral: ["00000011000000","0xx001hh100xx0","00xx1hssp1xx00","0001ssssss1000","001ssssssss100","001s1e1s1e1s10","001sss1s1sss10","001ssssssss100","0001ss11ss1000","0001hsssss1000","000011hh110000","00000011000000","00000000000000","00000000000000"],
            happy:   ["00000011000000","0xx001hh100xx0","00xx1hssp1xx00","0001ssssss1000","001ssssssss100","001s111s111s10","001ssssssss100","001sss11sss100","0001ssssss1000","0001hsssss1000","000011hh110000","00000011000000","00000000000000","00000000000000"],
            angry:   ["00000011000000","0xx001hh100xx0","00xx1hssp1xx00","0001ssssss1000","001s111111s100","001s1e1s1e1s10","001ssssssss100","001ssss1ss1100","0001ss11ss1000","0001hsssss1000","000011hh110000","00000011000000","00000000000000","00000000000000"]
        }
    };

    let emotionTimer = null;
    function setEmotion(emotion, duration = 2000) {
        if(!player.classId) return;
        renderPortrait(emotion);
        if(emotionTimer) clearTimeout(emotionTimer);
        if(emotion !== 'neutral') {
            emotionTimer = setTimeout(() => { renderPortrait('neutral'); }, duration);
        }
    }

    function renderPortrait(emotion) {
        if(!player.classId) return;
        const c = document.getElementById('portrait-canvas');
        const ctx = c.getContext('2d');
        ctx.clearRect(0, 0, 16, 16);
        const art = FACES[player.classId][emotion];
        const pal = PALETTES[player.classId];
        
        for(let y=0; y<art.length; y++) {
            for(let x=0; x<art[y].length; x++) {
                let char = art[y][x];
                if(char !== '0') {
                    ctx.fillStyle = pal[char];
                    ctx.fillRect(x + 1, y + 1, 1, 1);
                }
            }
        }
    }

    /* ================= DATA & CONFIG ================= */
    const CAP_LEVEL = 100;
    
    const CLASSES = {

    const ABILITIES = {

        stun: { name: 'Paralyzing Bash', type: 'stun', chance: 0.2, dur: 1, desc: 'You are stunned and lose your next turn!' },

        bossStun: { name: 'Earthshatter', type: 'stun', chance: 0.2, dur: 1, desc: 'The boss shatters the ground, stunning you!' }

    /* ================= UTILS & RENDERING ================= */
    function log(html, isSystem = false) {
        const div = document.createElement('div');
        div.innerHTML = html;
        if(isSystem) div.className = "text-amber-500 font-bold border-l-2 border-amber-500 pl-2 my-2";
        domLog.appendChild(div);
        domLog.scrollTop = domLog.scrollHeight;
    }

    function clearLog() { domLog.innerHTML = ''; }
    function setTitle(title, loc) { domTitle.innerText = title; if(loc) domLocation.innerText = loc; }

    // Inventory Globals
    window.getInvCount = function() {
        return player.inventory.reduce((sum, item) => sum + item.qty, 0);
    };
    
    window.addItem = function(item) {
        if (window.getInvCount() >= 20) return false;
        let existing = player.inventory.find(i => i.name === item.name);
        if (existing && item.type !== 'weapon' && item.type !== 'armor' && item.type !== 'accessory') {
            existing.qty++;
        } else {
            player.inventory.push({...item, qty: 1});
        }
        return true;
    };
    
    window.removeItem = function(idx) {
        if(player.inventory[idx].qty > 1) player.inventory[idx].qty--;
        else player.inventory.splice(idx, 1);
    };

    window.discardItem = function(idx) {
        window.removeItem(idx);
        window.openInventory(gameState);
        updateStats();
    };

    window.useItemInv = function(idx) {
        let item = player.inventory[idx];
        if (item.type === 'potion') {
            if(player.hp >= player.maxHp) return;
            player.hp = Math.min(player.maxHp, player.hp + item.heal);
        } else if (item.type === 'ether') {
            if(player.sp >= player.maxSp) return;
            player.sp = Math.min(player.maxSp, player.sp + item.restore);
        }
        window.removeItem(idx);
        window.openInventory(gameState);
        updateStats();
    };

    window.equipItem = function(idx) {
        let item = player.inventory[idx];
        
        if (item.type === 'accessory') {
            if (!player.accessory1) {
                player.accessory1 = { ...item };
                window.removeItem(idx);
            } else if (!player.accessory2) {
                player.accessory2 = { ...item };
                window.removeItem(idx);
            } else {
                let oldAcc = player.accessory1;
                player.accessory1 = { ...item };
                window.removeItem(idx);
                window.addItem({...oldAcc, type: 'accessory'});
            }
        } else {
            let currentGear = player[item.type];
            window.removeItem(idx);
            if (currentGear) window.addItem({...currentGear, type: item.type});
            player[item.type] = { ...item };
        }
        
        window.openInventory(gameState);
        updateStats();
    };

    window.sellItem = function(idx) {
        let item = player.inventory[idx];
        let price = Math.floor((item.cost || 10) / 2);
        player.gold += price;
        window.removeItem(idx);
        window.openShop('sell');
        updateStats();
    };

    function updateEnemyStats() {
        if(!currentEnemy) return;
        document.getElementById('enemy-hp-text').innerText = `${Math.max(0, currentEnemy.hp)}/${currentEnemy.maxHp}`;
        document.getElementById('enemy-hp-bar').style.width = `${(Math.max(0, currentEnemy.hp) / currentEnemy.maxHp) * 100}%`;
    }

    function updateStats() {
        if (!player.classId || gameState === 'START') return; 
        const cls = CLASSES[player.classId];
        
        document.getElementById('hdr-gold').innerText = player.gold;
        document.getElementById('hdr-lvl').innerText = player.level;
        document.getElementById('char-name-class').innerText = `Level ${player.level} ${cls.name}`;
        
        let status = "Healthy";
        let statusColor = "text-green-400";
        if(player.hp <= 0) { status = "Dead"; statusColor = "text-red-600"; }
        else if(player.debuffs.stun > 0) { status = "Stunned!"; statusColor = "text-yellow-400"; }
        else if(player.debuffs.poison > 0) { status = "Poisoned!"; statusColor = "text-green-500"; }
        else if(player.debuffs.weaken > 0) { status = "Weakened!"; statusColor = "text-purple-400"; }
        else if(player.buffs.immuneTurns > 0) { status = "Immune!"; statusColor = "text-blue-400"; }
        else if(player.buffs.defTurns > 0) { status = "Defense Up!"; statusColor = "text-blue-300"; }
        else if(player.hp < player.maxHp * 0.3) { status = "Wounded"; statusColor = "text-red-400"; }
        
        const statEl = document.getElementById('char-status');
        statEl.innerText = status;
        statEl.className = `text-xs font-bold ${statusColor}`;

        document.getElementById('stat-hp').innerText = `${Math.floor(player.hp)}/${player.maxHp}`;
        document.getElementById('bar-hp').style.width = `${(player.hp / player.maxHp) * 100}%`;
        
        document.getElementById('stat-sp').innerText = `${Math.floor(player.sp)}/${player.maxSp}`;
        document.getElementById('bar-sp').style.width = `${(player.sp / player.maxSp) * 100}%`;
        
        const nextXp = getNextXp();
        if(player.level >= CAP_LEVEL) {
            document.getElementById('stat-xp').innerText = `MAX`;
            document.getElementById('bar-xp').style.width = `100%`;
        } else {
            document.getElementById('stat-xp').innerText = `${player.xp}/${nextXp}`;
            document.getElementById('bar-xp').style.width = `${(player.xp / nextXp) * 100}%`;
        }

        const totalAtk = getPlayerTotalAtk();
        const totalDef = getPlayerTotalDef();
        
        document.getElementById('stat-atk').innerText = totalAtk;

        document.getElementById('stat-def').innerText = defText;
        
        document.getElementById('eq-weapon').innerText = `Wep: ${player.weapon ? player.weapon.name + ' (+'+player.weapon.atk+')' : 'None'}`;
        document.getElementById('eq-armor').innerText = `Arm: ${player.armor ? player.armor.name + ' (+'+player.armor.def+')' : 'None'}`;
        document.getElementById('eq-accessory1').innerText = `Acc 1: ${player.accessory1 ? player.accessory1.name : 'None'}`;

        domControls.innerHTML = '';
        buttons.forEach(b => {
            const btn = document.createElement('button');

    function getNextXp() { return player.level * player.level * 50; }
    function getPlayerTotalAtk() { 
        let base = player.baseAtk + (player.weapon ? player.weapon.atk : 0);
        if (player.accessory1 && player.accessory1.type === 'atk') base += player.accessory1.val;
        if (player.accessory2 && player.accessory2.type === 'atk') base += player.accessory2.val;
        if (player.bountyLevel[2] === 3) base = Math.floor(base * 1.15); // Solar Badge Buff
        return base; 
    }
    function getPlayerTotalDef() { 
        let base = player.baseDef + (player.armor ? player.armor.def : 0); 
        if (player.accessory1 && player.accessory1.type === 'def') base += player.accessory1.val;
        if (player.accessory2 && player.accessory2.type === 'def') base += player.accessory2.val;
        if (player.bountyLevel[3] === 3) base = Math.floor(base * 1.15); // Glacier Badge Buff
        if(player.debuffs.weaken > 0) base = Math.floor(base * 0.5); 
        return player.buffs.defTurns > 0 ? Math.floor(base * player.buffs.defMult) : base;
    }

    /* ================= MAZE GENERATION & RENDERING ================= */
    function generateMaze(size) {
        let maze = Array(size).fill().map(() => Array(size).fill(1));
        let start = {x: 1, y: 1};
        let maxDist = 0;
        let bossPos = {x: 1, y: 1};

        function carve(x, y, dist) {
            maze[y][x] = 0;
            if (dist > maxDist) { maxDist = dist; bossPos = {x, y}; }
            
            let dirs = [[0,-2], [0,2], [-2,0], [2,0]].sort(() => Math.random() - 0.5);
            for (let d of dirs) {
                let nx = x + d[0], ny = y + d[1];
                if (nx > 0 && nx < size-1 && ny > 0 && ny < size-1 && maze[ny][nx] === 1) {
                    maze[y + d[1]/2][x + d[0]/2] = 0;
                    carve(nx, ny, dist + 1);
                }
            }
        }
        carve(start.x, start.y, 0);
        
        maze[start.y][start.x] = 2; 
        maze[bossPos.y][bossPos.x] = 3; 
        return { grid: maze, start: start, boss: bossPos, size: size };
    }

    function resizeMap() {
        if(gameState !== 'EXPLORE') return;
        const container = domMapCanvas.parentElement;
        domMapCanvas.width = container.clientWidth;
        domMapCanvas.height = container.clientHeight - 48; 
    }
    window.addEventListener('resize', () => { if(gameState === 'EXPLORE') { resizeMap(); drawMap(); } });

    function drawMap() {
        if(!currentMap) return;
        const ctx = domMapCanvas.getContext('2d');
        const W = domMapCanvas.width; const H = domMapCanvas.height; 
        const GRID_SIZE = currentMap.size;
        const tileSize = Math.floor(Math.min(W / GRID_SIZE, H / GRID_SIZE));
        const offsetX = Math.floor((W - (GRID_SIZE * tileSize)) / 2);
        const offsetY = Math.floor((H - (GRID_SIZE * tileSize)) / 2);
        
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(0, 0, W, H);
        
        const area = AREAS[currentAreaIdx];
        
        for(let y=0; y<GRID_SIZE; y++) {
            for(let x=0; x<GRID_SIZE; x++) {
                let tile = currentMap.grid[y][x];
                if(tile === 1) ctx.fillStyle = area.mapColors.wall;
                else ctx.fillStyle = area.mapColors.floor;
                ctx.fillRect(offsetX + x*tileSize, offsetY + y*tileSize, tileSize, tileSize);
                
                if(tile === 3) {
                    ctx.fillStyle = '#ef4444';
                    ctx.fillRect(offsetX + x*tileSize + tileSize*0.2, offsetY + y*tileSize + tileSize*0.2, tileSize*0.6, tileSize*0.6);
                }
            }
        }
        ctx.fillStyle = '#3b82f6';
        ctx.fillRect(offsetX + playerMapPos.x*tileSize + tileSize*0.2, offsetY + playerMapPos.y*tileSize + tileSize*0.2, tileSize*0.6, tileSize*0.6);

        if (typeof drawMapEffects === 'function') drawMapEffects(ctx, W, H);
    }

        player.maxSp = cls.sp; player.sp = cls.sp;

    function enterTown() {
        gameState = 'TOWN';
        showTextLog();
        clearTimeout(turnTimeout);
        player.buffs = { immuneTurns: 0, defMult: 1, defTurns: 0 }; 
        player.debuffs = { poison: 0, stun: 0, weaken: 0 }; 
        updateStats();
        
        if (currentAreaIdx < 4 && player.relics[currentAreaIdx]) {
            AudioEngine.setTrack('upbeat', currentAreaIdx);
        } else {
            AudioEngine.setTrack('somber', currentAreaIdx);
        }
        
        const area = AREAS[currentAreaIdx];
        setTitle(area.townName, area.name);
        
        clearLog();
        log(`You are at the safe outpost of <b>${area.townName}</b>.`);
        log(`<i>${area.desc}</i>`);

        let buttons = [
            { text: `Explore ${area.name}`, class: 'text-amber-300', action: startMapExploration },
            { text: `Open Bag (${window.getInvCount()}/20)`, class: 'text-yellow-100', action: () => window.openInventory('TOWN') },
            { text: 'Check Bounty Board', class: 'text-green-300', action: openBountyBoard },
            { text: 'Visit Shop', action: () => window.openShop('buy') },
            { text: 'Rest at Inn (' + getInnCost() + 'g)', action: visitInn },
            { text: 'Talk to Locals', class: 'text-blue-300', action: talkToNPC }
        ];

            if (currentAreaIdx < 4 && player.relics[currentAreaIdx]) {
                buttons.push({ text: `Travel to ${AREAS[currentAreaIdx+1].townName}`, class: 'text-purple-400', action: () => {
                    currentAreaIdx++; currentMap = null; enterTown();
                }});
            } else {
                let nextName = currentAreaIdx === 3 ? 'The Obsidian Citadel' : 'Next Region';
                buttons.push({ text: `Travel to ${nextName} (Requires Relic)`, disabled: true });
            }
        }
        
        if (currentAreaIdx > 0) {
            buttons.push({ text: `Travel Back to ${AREAS[currentAreaIdx-1].townName}`, action: () => {
                currentAreaIdx--; currentMap = null; enterTown();
            }});
        }

        renderButtons(buttons);
    }

    function getInnCost() {
        const area = AREAS[currentAreaIdx];
        return player.bountyLevel[0] === 3 ? Math.floor(area.innCost * 0.5) : area.innCost;
    }

    function talkToNPC() {
        const area = AREAS[currentAreaIdx];
        const relicsCount = player.relics.filter(r => r).length;
        let pool = [];
        
        if (currentAreaIdx === 4) {
            pool = area.npcs; 
        } else if (relicsCount === 0) {
            pool = area.npcs; 
        } else if (relicsCount === 1) {
            pool = [
                "They say a hero in the Plains defeated the Golem... Could it be you?",
                "Did you feel that? The wind... it feels a little warmer today. The seasons are shifting.",
                "One piece of the Star... it's a spark of hope, but Malacor is still too strong."
            ];
        } else if (relicsCount === 2) {
            pool = [
                "Two fragments restored! The earth itself is healing.",
                "The false king's magic is waning in the lower realms. You are doing it!",
                "You must find the rest. Do not let this hope die!"
            ];
        } else if (relicsCount === 3) {
            pool = [
                "Three fragments united! The leylines are singing your name!",
                "You are the Sovereign returned! We pledge our lives to your cause!",
                "Malacor's sky is cracking. The eternal seasons are breaking! Lead us to the dawn!"
            ];

            pool = [
                "The Star is whole! The path to the Obsidian Citadel is open!",
                "My liege, the people are arming themselves. We await your command to strike.",
                "Go to the Citadel. Reclaim the throne!"

        setEmotion('neutral', 1000);

    window.openShop = function(mode = 'buy') {
        gameState = 'SHOP';
        const area = AREAS[currentAreaIdx];
        const shop = area.shop;

        setTitle(area.townName + ' - Merchant', area.name);
        
        let logHTML = `<div class="flex gap-4 mb-4 border-b border-slate-600 pb-2">
            <button onclick="window.openShop('buy')" class="font-bold ${mode === 'buy' ? 'text-amber-400' : 'text-slate-500'} hover:text-amber-300">BUY</button>
            <button onclick="window.openShop('sell')" class="font-bold ${mode === 'sell' ? 'text-amber-400' : 'text-slate-500'} hover:text-amber-300">SELL</button>
        </div>`;

        if (mode === 'buy') {
            logHTML += `<p class="italic text-blue-300 mb-4">"Welcome, traveler! See anything you like?"</p>`;
            domLog.innerHTML = logHTML;

            let buttons = [];
            const cShop = shop[player.classId];
            const sShop = shop.sundries;

            if (!player.weapon || player.weapon.name !== cShop.weapon.name) {
                buttons.push({ text: `Buy ${cShop.weapon.name} (+${cShop.weapon.atk} ATK) - ${cShop.weapon.cost}g`, disabled: player.gold < cShop.weapon.cost, action: () => buyItem('weapon', cShop.weapon) });
            }
            if (!player.armor || player.armor.name !== cShop.armor.name) {
                buttons.push({ text: `Buy ${cShop.armor.name} (+${cShop.armor.def} DEF) - ${cShop.armor.cost}g`, disabled: player.gold < cShop.armor.cost, action: () => buyItem('armor', cShop.armor) });
            }
            
            buttons.push({ text: `Buy ${sShop.potion.name} - ${sShop.potion.cost}g`, disabled: player.gold < sShop.potion.cost, action: () => buyItem('potion', sShop.potion) });
            buttons.push({ text: `Buy ${sShop.ether.name} - ${sShop.ether.cost}g`, disabled: player.gold < sShop.ether.cost, action: () => buyItem('ether', sShop.ether) });

            if (shop.accessories) {
                shop.accessories.forEach(acc => {
                    let hasAcc = (player.accessory1 && player.accessory1.name === acc.name) || 
                                 (player.accessory2 && player.accessory2.name === acc.name);
                    if (!hasAcc) {
                        buttons.push({ text: `Buy ${acc.name} (${acc.desc}) - ${acc.cost}g`, disabled: player.gold < acc.cost, action: () => buyItem('accessory', acc) });
                    }
                });
            }

            buttons.push({ text: 'Leave Shop', class: 'mt-4', action: enterTown });
            renderButtons(buttons);

        } else { // SELL MODE
            logHTML += `<p class="italic text-blue-300 mb-4">"I'll buy your excess goods for half price."</p>`;
            
            if (player.inventory.length === 0) {
                logHTML += `<p class="text-slate-400">Your bag is empty.</p>`;
                domLog.innerHTML = logHTML;
            } else {
                domLog.innerHTML = logHTML;
                const list = document.createElement('div');
                list.className = "flex flex-col gap-2";
                player.inventory.forEach((item, idx) => {
                    const sellPrice = Math.floor((item.cost || 10) / 2);
                    const row = document.createElement('div');
                    row.className = "flex justify-between items-center bg-slate-900 p-2 rounded border border-slate-700";
                    row.innerHTML = `
                        <div><span class="font-bold text-amber-200">${item.name}</span> x${item.qty}</div>
                        <button onclick="window.sellItem(${idx})" class="text-xs bg-yellow-600 hover:bg-yellow-500 px-3 py-1 rounded font-bold">Sell (${sellPrice}g)</button>
                    `;
                    list.appendChild(row);
                });
                domLog.appendChild(list);
            }
            renderButtons([{ text: 'Leave Shop', class: 'mt-4', action: enterTown }]);
        }
    };

    function buyItem(type, item) {
        if (player.gold >= item.cost) {
            if (['weapon', 'armor'].includes(type)) {
                const currentGear = player[type];
                if (currentGear) {
                    if (window.getInvCount() >= 20) {
                        log(`<br><span class="text-red-400 font-bold">Bag full! Cannot unequip old gear. Make space first.</span>`, true);
                        return;
                    }
                    window.addItem({...currentGear, type: type});
                }
                player.gold -= item.cost;
                player[type] = { ...item };
            } else if (type === 'accessory') {
                if (!player.accessory1) {
                    player.gold -= item.cost;
                    player.accessory1 = { ...item };
                } else if (!player.accessory2) {
                    player.gold -= item.cost;
                    player.accessory2 = { ...item };
                } else {
                    if (window.getInvCount() >= 20) {
                        log(`<br><span class="text-red-400 font-bold">Bag full! Cannot unequip old gear. Make space first.</span>`, true);
                        return;
                    }
                    window.addItem({...player.accessory1, type: type});
                    player.gold -= item.cost;
                    player.accessory1 = { ...item };
                }
            } else {
                if (window.getInvCount() >= 20) {
                    log(`<br><span class="text-red-400 font-bold">Bag full! Make space first.</span>`, true);
                    return;
                }
                player.gold -= item.cost;
                window.addItem({...item, type: type});
            }
            
            log(`<br>Bought <span class="text-amber-200">${item.name}</span>.`, true);
            setEmotion('happy', 1500); 
            updateStats();
            window.openShop('buy'); 
        }
    }

    function visitInn() {
        const cost = getInnCost();
        if (player.gold >= cost) {
            player.gold -= cost;
            player.hp = player.maxHp;
            player.sp = player.maxSp;
            log(`You paid ${cost}g and rested at the inn. HP and SP fully restored!`, true);
            setEmotion('happy', 2000);
            updateStats();
            enterTown(); 
        } else {
            log(`"You don't have enough gold, friend," the innkeeper sighs.`, true);
            setEmotion('angry', 1500);
        }
    }

    /* ================= MAZE EXPLORATION & EFFECTS ================= */

    let mapAnimFrame = null;
    let mapFrameCount = 0;
    let weatherParticles = [];

    function initWeather() {
        weatherParticles = [];
        const W = domMapCanvas.width || 800;
        const H = domMapCanvas.height || 600;
        for(let i=0; i<40; i++) {
            weatherParticles.push({
                x: Math.random() * W,
                y: Math.random() * H,
                size: Math.random() * 3 + 1,
                offset: Math.random() * Math.PI * 2
            });
        }
    }

    function drawMapEffects(ctx, W, H) {
        mapFrameCount++;
        if(currentAreaIdx === 0) { // Autumn Leaves
            ctx.fillStyle = 'rgba(217, 119, 6, 0.6)'; 
            weatherParticles.forEach(p => {
                p.x += 2 + Math.sin(mapFrameCount*0.05 + p.offset);
                p.y += 1.5;
                if(p.x > W) p.x = 0;
                if(p.y > H) p.y = 0;
                ctx.fillRect(p.x, p.y, p.size*2, p.size);
            });
        } else if(currentAreaIdx === 1) { // Spring Rain
            ctx.fillStyle = 'rgba(96, 165, 250, 0.5)'; 
            weatherParticles.forEach(p => {
                p.y += 10 + p.size;
                if(p.y > H) p.y = 0;
                ctx.fillRect(p.x, p.y, 1, p.size*4);
            });
        } else if(currentAreaIdx === 2) { // Summer Haze/Sand
            ctx.fillStyle = 'rgba(253, 224, 71, 0.3)'; 
            weatherParticles.forEach(p => {
                p.x += 3; p.y -= 0.5;
                if(p.x > W) p.x = 0;
                if(p.y < 0) p.y = H;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
        } else if(currentAreaIdx === 3) { // Winter Snow
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            weatherParticles.forEach(p => {
                p.x += Math.sin(mapFrameCount*0.02 + p.offset);
                p.y += 1 + p.size*0.5;
                if(p.y > H) p.y = 0;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
        } else if(currentAreaIdx === 4) { // Void Energy
            ctx.fillStyle = 'rgba(168, 85, 247, 0.6)'; 
            weatherParticles.forEach(p => {
                p.y -= 2 + p.size;
                if(p.y < 0) p.y = H;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
        }
    }

    function mapLoop() {
        if(gameState === 'EXPLORE') {
            drawMap();
            mapAnimFrame = requestAnimationFrame(mapLoop);
        } else {
            mapAnimFrame = null;
        }
    }

    function startMapExploration() {
        gameState = 'EXPLORE';
        if (!currentMap) {
            const mazeSize = currentAreaIdx === 4 ? 21 : 15; 
            currentMap = generateMaze(mazeSize);
            playerMapPos = { x: currentMap.start.x, y: currentMap.start.y };
        }
        AudioEngine.setTrack('maze', currentAreaIdx);
        setTitle(`Exploring ${AREAS[currentAreaIdx].name}`, AREAS[currentAreaIdx].name);
        showMapCanvas();
        renderButtons([
            { text: `Open Bag (${window.getInvCount()}/20)`, class: 'text-yellow-100', action: () => window.openInventory('EXPLORE') },
            { text: 'Flee to Town', class: 'text-slate-400', action: enterTown }
        ]);
        initWeather();
        if(!mapAnimFrame) mapLoop();
    }

    function resumeExploration() {
        gameState = 'EXPLORE';
        document.getElementById('enemy-panel').classList.add('hidden');
        AudioEngine.setTrack('maze', currentAreaIdx);
        setTitle(`Exploring ${AREAS[currentAreaIdx].name}`, AREAS[currentAreaIdx].name);
        showMapCanvas();
        renderButtons([
            { text: `Open Bag (${window.getInvCount()}/20)`, class: 'text-yellow-100', action: () => window.openInventory('EXPLORE') },
            { text: 'Flee to Town', class: 'text-slate-400', action: enterTown }
        ]);
        if(!mapAnimFrame) mapLoop();
    }

    window.addEventListener('keydown', (e) => {
        if(gameState !== 'EXPLORE') return;
        let dx = 0, dy = 0;
        if(e.key === 'w' || e.key === 'ArrowUp') dy = -1;
        else if(e.key === 's' || e.key === 'ArrowDown') dy = 1;
        else if(e.key === 'a' || e.key === 'ArrowLeft') dx = -1;
        else if(e.key === 'd' || e.key === 'ArrowRight') dx = 1;
        
        if(dx !== 0 || dy !== 0) {
            e.preventDefault();
            movePlayer(dx, dy);
        }
    });

    function movePlayer(dx, dy) {
        if(!currentMap) return;
        let nx = playerMapPos.x + dx;
        let ny = playerMapPos.y + dy;
        
        if(nx >= 0 && nx < currentMap.size && ny >= 0 && ny < currentMap.size && currentMap.grid[ny][nx] !== 1) {
            playerMapPos.x = nx;
            playerMapPos.y = ny;
            drawMap();
            checkMapTile();
        }
    }

    function checkMapTile() {
        let tile = currentMap.grid[playerMapPos.y][playerMapPos.x];
        
        if (tile === 3) {
            if (currentAreaIdx === 4 || !player.relics[currentAreaIdx]) {
                currentMap.grid[playerMapPos.y][playerMapPos.x] = 0; 
                triggerBoss();
            }
        } else {
            let roll = Math.random();
            if(roll < 0.08) triggerCombat();
            else if(roll < 0.12) triggerGold();
            else if(roll < 0.15 && currentAreaIdx < 4) triggerSkill(); 
        }
    }

    /* ================= EVENTS & GHOST LORE ================= */

    function triggerGhostLore(areaIdx) {
        gameState = 'EVENT';
        showTextLog();
        clearLog();
        AudioEngine.setTrack('upbeat', areaIdx); 
        
        const loreChunks = [
            "A translucent figure of a knight rises from the fallen Golem. <br><br><span class='dialogue'>'I am Sir Kaelen, first blade of the old king. When the Star was whole, these plains fed the entire world. You have taken the first step. Do not falter, the realm remembers its true master.'</span>",
            "A spirit adorned in leaves manifests from the vines. <br><br><span class='dialogue'>'The spring was a time of rebirth, not this choking overgrowth. I am Lyra, keeper of the groves. Two pieces united... I can feel the earth breathing again. You must hurry.'</span>",
            "A spectral scholar coalesces from the shifting sands. <br><br><span class='dialogue'>'Three fragments. The magic stabilizes. Before Malacor's greed burned this desert, it was a cradle of knowledge. Restore the final piece, Sovereign, and end this heat.'</span>",
            "The ghost of a crowned figure steps from the shattered ice. <br><br><span class='dialogue'>'I was the last ruler before the fracture. You hold all four pieces of The Ryal Star. The Seal of Sovereignty is whole! The path to the Obsidian Citadel is open. Avenge us. Strike down Malacor!'</span>"
        ];

            { text: 'Return to Outpost', class: 'text-amber-300', action: enterTown }

    function triggerGold() {
        gameState = 'EVENT';
        showTextLog();
        clearLog();
        const foundGold = Math.floor(Math.random() * 20) + (10 * (currentAreaIdx + 1));
        player.gold += foundGold;
        log(`<br>You found a hidden stash in the maze containing <span class="text-yellow-400">${foundGold} gold</span>!`, true);
        setEmotion('happy', 2000);
        updateStats();
        renderButtons([{ text: 'Resume Exploration', class: 'text-amber-300', action: resumeExploration }]);
    }

    function triggerSkill() {
        const potentialSkill = SKILLS[player.classId][currentAreaIdx];
        if (!player.skills.includes(potentialSkill.id)) {
            gameState = 'EVENT';
            showTextLog();
            clearLog();
            player.skills.push(potentialSkill.id);
            log(`<br><span class="text-cyan-400 font-bold text-lg">*** You discovered an ancient tome! ***</span>`);
            log(`You learned a new skill: <b>${potentialSkill.name}</b>!`);
            log(`<i>${potentialSkill.desc}</i>`);
            setEmotion('happy', 3000);
            updateStats();
            renderButtons([{ text: 'Resume Exploration', class: 'text-amber-300', action: resumeExploration }]);
        }
    }

    function triggerBoss() {
        const area = AREAS[currentAreaIdx];
        showTextLog();
        clearLog();
        
        if (currentAreaIdx === 4) {
            AudioEngine.setTrack('final_boss', currentAreaIdx);
            log(`<br><span class="text-red-600 font-black text-2xl">THE THRONE ROOM</span>`);
            log(`<b>Malacor The Usurper</b> rises from his obsidian throne. The air crackles with void magic!`);
        } else {
            AudioEngine.setTrack('boss', currentAreaIdx);
            log(`<br><span class="text-red-500 font-bold text-lg">You have entered the Boss Room!</span>`);
            log(`<b>${area.boss.name}</b> guards the piece of The Ryal Star!`);
        }
        
        currentEnemy = { ...area.boss, maxHp: area.boss.hp, isBoss: true };
        setEmotion('angry', 2000);
        setTimeout(startCombat, 1500);
    }

    function triggerCombat() {
        const area = AREAS[currentAreaIdx];
        showTextLog();
        clearLog();
        AudioEngine.setTrack('maze', currentAreaIdx);
        
        const bLevel = player.bountyLevel[currentAreaIdx];
        let enemyTemplate;
        let isForcedBounty = false;
        
        // Pity timer for bounties (spawn at least 1 in 10)
        if (bLevel < 3) {
            const targetName = area.bounties[bLevel].target;
            if (player.fightsSinceBountyTarget >= 9) {
                enemyTemplate = area.enemies.find(e => e.name === targetName);
                if(enemyTemplate) isForcedBounty = true;
            }
        }
        
        if (!isForcedBounty) {
            enemyTemplate = area.enemies[Math.floor(Math.random() * area.enemies.length)];
        }
        
        // Reset or increment pity timer
        if (bLevel < 3 && enemyTemplate.name === area.bounties[bLevel].target) {
            player.fightsSinceBountyTarget = 0;
        } else {
            player.fightsSinceBountyTarget++;
        }

        // Enemy Scaling Logic
        let hpMult = 1.0;
        let statMult = 1.0;
        let xpMult = 1.0;
        
        let levelDiff = player.level - area.expectedLevel;
        if (levelDiff > 0) {
            hpMult += 0.25 * levelDiff;
            statMult += 0.15 * levelDiff;
            xpMult += 0.25 * levelDiff;
        }
        
        currentEnemy = { 
            ...enemyTemplate, 
            maxHp: Math.floor(enemyTemplate.hp * hpMult),
            hp: Math.floor(enemyTemplate.hp * hpMult),
            atk: Math.floor(enemyTemplate.atk * statMult),
            def: Math.floor(enemyTemplate.def * statMult),
            xp: Math.floor(enemyTemplate.xp * xpMult),
            isBoss: false 
        };
        
        log(`<br>Ambush! A wild <b>${currentEnemy.name}</b> attacks!`);
        if (levelDiff > 0) {
            log(`<span class="text-xs text-purple-400">The enemy has grown stronger to match your power!</span>`);
        }
        
        setEmotion('angry', 1500);
        setTimeout(startCombat, 1500);
    }

    /* ================= COMBAT LOGIC ================= */

    function startCombat() {
        gameState = 'COMBAT';
        setTitle('Combat!', AREAS[currentAreaIdx].name);
        player.buffs = { immuneTurns: 0, defMult: 1, defTurns: 0 }; 
        player.debuffs = { poison: 0, stun: 0, weaken: 0 };
        player.isFirstTurn = true;
        
        // Show Enemy UI
        document.getElementById('enemy-panel').classList.remove('hidden');
        document.getElementById('enemy-name').innerText = currentEnemy.name;
        
        // Generate a context-aware 16-bit RPG monster image
        const prompt = `16-bit pixel art sprite of ${currentEnemy.name}, retro rpg monster, dark blue background`;
        document.getElementById('enemy-image').src = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=128&height=128&nologo=true`;
        
        renderCombatUI();
    }

    function processPlayerTurnStart() {
        if(player.debuffs.stun > 0) {
            log(`<span class="text-yellow-400 font-bold">>> You are STUNNED and cannot move! <<</span>`);
            player.debuffs.stun--;
            updateStats();
            renderButtons([]); 
            turnTimeout = setTimeout(enemyTurn, 1500);
            return false; 
        }
        return true; 
    }

    function processPlayerTurnEnd() {
        if(player.debuffs.poison > 0) {
            const pDmg = Math.max(1, Math.floor(player.maxHp * 0.05));
            player.hp -= pDmg;
            log(`<span class="text-green-500 italic">Poison saps ${pDmg} HP from you...</span>`);
            player.debuffs.poison--;
            if(player.hp <= 0) return loseCombat();
        }
        if(player.debuffs.weaken > 0) player.debuffs.weaken--;
        
        updateEnemyStats();
        updateStats();
    }

    function renderCombatUI() {
        if (player.hp <= 0) return loseCombat();
        if (currentEnemy.hp <= 0) return winCombat();

        updateEnemyStats();
        updateStats();

        if(!processPlayerTurnStart()) return;
        
        let buttons = [
            { text: 'Basic Attack', action: () => playerTurn('attack') }
        ];

        const mySkills = SKILLS[player.classId];
        mySkills.forEach(skill => {
            if (player.skills.includes(skill.id)) {
                let colorClass = skill.type === 'off' ? 'text-red-300' : 'text-blue-300';
                buttons.push({ 
                    text: `${skill.name} (${skill.cost} SP)`, class: colorClass,
                    disabled: player.sp < skill.cost, action: () => playerTurn('skill', skill) 
                });
            }
        });

        let potCount = player.inventory.filter(i => i.type === 'potion').reduce((s, i) => s + i.qty, 0);
        let etherCount = player.inventory.filter(i => i.type === 'ether').reduce((s, i) => s + i.qty, 0);

        buttons.push({ 
            text: `Potion (${potCount})`, 
            disabled: potCount <= 0, action: () => playerTurn('potion') 
        });
        buttons.push({ 
            text: `Ether (${etherCount})`, 
            disabled: etherCount <= 0, action: () => playerTurn('ether') 
        });

        if (!currentEnemy.isBoss) {
            buttons.push({ text: 'Flee Combat', class: 'mt-2 text-slate-400', action: () => playerTurn('flee') });
        }

        renderButtons(buttons);
    }

    function calculatePlayerDamage(mult = 1.0) {
        let totalAtk = getPlayerTotalAtk() * mult;
        if (player.isFirstTurn) {
            if ((player.accessory1 && player.accessory1.effect === 'first_strike') || 
                (player.accessory2 && player.accessory2.effect === 'first_strike')) {
                totalAtk *= 1.5;
            }
        }
        const minDmg = Math.floor(totalAtk * 0.2);
        const standardDmg = totalAtk - currentEnemy.def + Math.floor(Math.random()*10);
        return Math.max(minDmg, standardDmg);
    }

    function playerTurn(action, skillData = null) {
        renderButtons([]); 
        const area = AREAS[currentAreaIdx];
        let msg = '';

        if (action === 'attack') {
            const dmg = calculatePlayerDamage(1.0);
            currentEnemy.hp -= dmg;
            msg = `You attacked <b>${currentEnemy.name}</b> for <span class="text-red-400">${dmg} dmg</span>!`;
        } 
        else if (action === 'skill') {
            player.sp -= skillData.cost;
            if (skillData.type === 'off') {
                const dmg = calculatePlayerDamage(skillData.mult);
                currentEnemy.hp -= dmg;
                msg = `You used <span class="text-red-300">${skillData.name}</span>! Hit <b>${currentEnemy.name}</b> for <span class="text-red-400">${dmg} dmg</span>!`;
            } else if (skillData.type === 'def') {
                if(skillData.effect) skillData.effect(player);
                msg = `You used <span class="text-blue-300">${skillData.name}</span>! ${skillData.desc}`;
            }
        }
        else if (action === 'potion') {
            let potIdx = player.inventory.findIndex(i => i.type === 'potion');
            if(potIdx !== -1) {
                let item = player.inventory[potIdx];
                player.hp = Math.min(player.maxHp, player.hp + item.heal);
                msg = `You drank ${item.name}, restoring ${item.heal} HP.`;
                window.removeItem(potIdx);
            }
        }
        else if (action === 'ether') {
            let etherIdx = player.inventory.findIndex(i => i.type === 'ether');
            if(etherIdx !== -1) {
                let item = player.inventory[etherIdx];
                player.sp = Math.min(player.maxSp, player.sp + item.restore);
                msg = `You drank ${item.name}, restoring ${item.restore} SP.`;
                window.removeItem(etherIdx);
            }
        }
        else if (action === 'flee') {
            log(`You fled from combat and ran back to town!`);
            document.getElementById('enemy-panel').classList.add('hidden');
            return setTimeout(enterTown, 1000);
        }

        log(`> ` + msg);
        
        processPlayerTurnEnd(); 
        player.isFirstTurn = false;

        if (currentEnemy.hp <= 0) {
            setTimeout(winCombat, 1000);
        } else {
            turnTimeout = setTimeout(enemyTurn, 1000);
        }
    }

    function enemyTurn() {
        let isImmune = player.buffs.immuneTurns > 0;
        
        if (isImmune) {
            log(`<span class="text-slate-400">> <b>${currentEnemy.name}</b> attacks, but your defenses completely blocked it!</span>`);
            player.buffs.immuneTurns--;
        } else {
            if (currentEnemy.ability && Math.random() < currentEnemy.ability.chance) {
                const ab = currentEnemy.ability;
                
                let accImmune = false;
                [player.accessory1, player.accessory2].forEach(acc => {
                    if (acc && acc.type === 'utility') {
                        if (acc.effect === 'immune_all') accImmune = true;
                        else if (acc.effect === 'immune_poison' && ab.type === 'poison') accImmune = true;
                        else if (acc.effect === 'immune_weaken' && ab.type === 'weaken') accImmune = true;
                        else if (acc.effect === 'immune_stun' && ab.type === 'stun') accImmune = true;
                    }
                });
                
                if (accImmune) {
                    log(`<span class="text-blue-400">> <b>${currentEnemy.name}</b> tries to use ${ab.name}, but your accessories protect you!</span>`);
                } else {
                    log(`<span class="text-purple-400">> <b>${currentEnemy.name}</b> uses ${ab.name}! ${ab.desc}</span>`);
                    player.debuffs[ab.type] = ab.dur;
                    setEmotion('angry', 1500);
                }
            } else {
                const minEnemyDmg = Math.floor(currentEnemy.atk * 0.2);
                const standardEnemyDmg = currentEnemy.atk - getPlayerTotalDef() + Math.floor(Math.random()*5);
                const dmg = Math.max(minEnemyDmg, standardEnemyDmg);
                
                player.hp -= dmg;
                log(`<span class="text-slate-400">> <b>${currentEnemy.name}</b> attacks you for <span class="text-red-500">${dmg} dmg</span>!</span>`);
                setEmotion('angry', 1000);
            }
        }

        if(player.buffs.defTurns > 0) player.buffs.defTurns--;
        if(player.buffs.defTurns === 0) player.buffs.defMult = 1;

        updateEnemyStats();
        updateStats();

        if (player.hp <= 0) setTimeout(loseCombat, 1000);
        else renderCombatUI();
    }

    function winCombat() {
        gameState = 'EVENT';
        document.getElementById('enemy-panel').classList.add('hidden');
        
        // Verdant Badge Gold Multiplier
        const goldMult = player.bountyLevel[1] === 3 ? 1.5 : 1.0; 
        const earnedGold = Math.floor(currentEnemy.gold * goldMult);
        
        player.xp += currentEnemy.xp;
        player.gold += earnedGold;
        
        log(`<br><span class="text-green-400 font-bold">Victory!</span>`);
        log(`You gained <span class="text-yellow-400">${earnedGold}g</span> and <span class="text-purple-400">${currentEnemy.xp} XP</span>.`);
        setEmotion('happy', 2500);

        if (currentEnemy.isBoss) {
            if (currentAreaIdx < 4 && !player.relics[currentAreaIdx]) {
                player.relics[currentAreaIdx] = true;
                log(`<br><span class="text-amber-400 font-bold text-lg">*** You obtained a piece of The Ryal Star! ***</span>`, true);
                checkLevelUp();
                updateStats();
                setTimeout(() => triggerGhostLore(currentAreaIdx), 2000);
                return; // Wait for lore event
            } else if (currentAreaIdx === 4) {
                checkLevelUp();
                updateStats();
                setTimeout(winGame, 2000);
                return; // Game Over screen
            }
        } else {
            // Check Sequential Bounty Progress
            const bLevel = player.bountyLevel[currentAreaIdx];
            if (bLevel < 3) {
                const bounty = AREAS[currentAreaIdx].bounties[bLevel];
                if (currentEnemy.name === bounty.target) {
                    player.bountyProgress[currentAreaIdx]++;
                    log(`<br><span class="text-cyan-400 font-bold">Bounty Progress: ${player.bountyProgress[currentAreaIdx]} / ${bounty.req} ${bounty.target}s defeated.</span>`);
                    if (player.bountyProgress[currentAreaIdx] >= bounty.req) {
                        player.bountyLevel[currentAreaIdx]++;
                        player.bountyProgress[currentAreaIdx] = 0;
                        player.xp += bounty.xp;
                        player.gold += bounty.gold;
                        log(`<br><span class="text-amber-400 font-bold text-lg">*** BOUNTY COMPLETE! ***</span>`);
                        log(`Reward: <span class="text-green-400">${bounty.rewardDesc}</span> applied!`);
                        
                        if (player.bountyLevel[currentAreaIdx] === 3) {
                            const badge = AREAS[currentAreaIdx].badge;
                            log(`<br><span class="text-purple-400 font-bold text-xl">*** REGION PACIFIED! ***</span>`);
                            log(`You earned the <span class="${badge.colorText} font-bold">${badge.name}</span>!`);
                            log(`Badge Effect: ${badge.desc}`);
                            if (badge.onEarn) badge.onEarn(player);
                        }
                        setEmotion('happy', 4000);
                    }
                }
            }

            // Random Enemy Drops (40% chance)
            if (Math.random() < 0.4) {
                const isPot = Math.random() < 0.5;
                const dropItem = isPot ? AREAS[currentAreaIdx].shop.sundries.potion : AREAS[currentAreaIdx].shop.sundries.ether;
                const type = isPot ? 'potion' : 'ether';
                
                if (window.getInvCount() < 20) {
                    window.addItem({...dropItem, type: type});
                    log(`<br><span class="text-amber-200 text-sm">The enemy dropped a ${dropItem.name}!</span>`);
                } else {
                    log(`<br><span class="text-slate-500 text-sm">The enemy dropped a ${dropItem.name}, but your bag is full.</span>`);
                }
            }
        }

        checkLevelUp();
        updateStats();

        renderButtons([
            { text: 'Resume Exploration', class: 'text-amber-300', action: resumeExploration },
            { text: 'Return to Outpost', action: enterTown }
        ]);
    }

    function loseCombat() {
        gameState = 'TOWN';
        document.getElementById('enemy-panel').classList.add('hidden');
        log(`<br><span class="text-red-600 font-black text-xl">YOU HAVE FALLEN.</span>`);
        log(`Rescuers drag your unconscious body back to the inn. You lose half your gold.`);
        setEmotion('angry', 5000);
        
        player.gold = Math.floor(player.gold / 2);
        player.hp = player.maxHp; 
        player.sp = player.maxSp;
        player.buffs = { immuneTurns: 0, defMult: 1, defTurns: 0 };
        player.debuffs = { poison: 0, stun: 0, weaken: 0 };
        currentMap = null; 
        
        updateStats();
        renderButtons([{ text: 'Wake Up', action: enterTown }]);
    }

    function checkLevelUp() {
        if (player.level >= CAP_LEVEL) return;

        let leveledUp = false;
        while (player.xp >= getNextXp() && player.level < CAP_LEVEL) {
            player.xp -= getNextXp();
            player.level++;
            
            const cls = CLASSES[player.classId];
            player.maxHp += cls.hpGrowth;
            player.maxSp += cls.spGrowth;
            player.baseAtk += cls.atkGrowth;
            player.baseDef += cls.defGrowth;
            
            player.hp = player.maxHp;
            player.sp = player.maxSp;
            leveledUp = true;
        }

        if (leveledUp) {
            log(`<br><span class="text-cyan-400 font-bold text-lg">LEVEL UP! You are now Level ${player.level}!</span>`, true);
            setEmotion('happy', 3000);
        }
    }

    function winGame() {
        gameState = 'WIN';
        showTextLog();
        setTitle('Victory!', 'The World Saved');
        domPlayerPanel.classList.add('hidden');
        clearLog();
        AudioEngine.setTrack('upbeat', 0); // Triumphant music
        
        log(`<h2 class="text-3xl text-amber-400 font-black mb-4">THE RYAL STAR IS RESTORED!</h2>`);
        log(`With Malacor defeated, the four fragments fuse together, radiating blinding astral light.`);
        log(`The dark magic of the Obsidian Citadel shatters. Above you, the fractured sky heals, and the cycle of seasons begins anew.`);
        log(`<br>You have completed your quest, brave ${CLASSES[player.classId].name}. The realm bows to its true Sovereign once more.`);
        log(`<br><b>Final Level:</b> ${player.level}`);
        log(`<b>Final Gold:</b> ${player.gold}`);
        
        renderButtons([{ text: 'Play Again', action: init }]);
    }
